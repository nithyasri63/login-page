<!DOCTYPE html>
<html>
    <head>
        <style>
            body{
                background-image: linear-gradient(to right,rgb(8, 64, 128),rgb(122, 10, 89));
                display: flex;
                flex-direction: row;
                justify-content: center;
                align-items: center;
                height: 635px;
                
            }
            form{
                background-color: white;
                width: 300px;
                height: 350px;
                border-radius: 6px;
               display: flex;
               flex-direction: column;
               justify-content: space-around;
               align-items: center;
              
            }
            .title{
                font-size: 22px;
                font-weight: bold;
                margin-top:5px;
                margin-bottom: 0px;
             
            }
            hr{
                margin-top: 0px;
                border-top: 1px solid rgb(199, 197, 197);
                border-bottom: none;
                width: 100%;

            }
            .user_info{
                border-left:none;
                border-right:none;
                border-top: none;
                border-bottom:1px solid gray;    
                font-family:'Times New Roman', Times, serif;
                font-size: medium; 
                outline:none;         
            }
            .forget_info{
                color:rgb(153, 147, 147);
                cursor: pointer;
                height: 1px;
               
            }
            button{
                padding:8px 100px;
                border:1px solid black;
                border-radius: 50px;
                font-weight:bold;
                font-size:15px;
                cursor: pointer;
                background-color:whitesmoke;
            }
            .member-info{
                color:rgb(78, 72, 72);
                font-size: 14px;
                cursor: pointer;
            
            }
            span{
                color:rgb(0, 119, 255);
                cursor: pointer;
            }
            
        </style>

    </head>
    <body>
        <form>
            <p class="title"> Login</p><hr>
            <input class="user_info" type="text" placeholder="Username">
            <input  class="user_info "type="password" placeholder="Password">
            <p class="forget_info">Forget Password?</p>
            <button>Login</button>
            <p class="member-info">Not a Member ?<span> Signup</span></p>
            
        </form>
    </body>
    
</html>
